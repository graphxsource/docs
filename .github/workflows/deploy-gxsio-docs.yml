name: "Deploy Gxsio Docs (AKS)"

on:
  push:
    branches:
      - main
    paths:
      - "apps/gxsio/**"
      - ".github/workflows/deploy-gxsio-docs.yml"

jobs:
  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest

    environment: production

    env:
      IMAGE_NAME: gxsio-docs

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: echo "image_tag=v${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gxsio/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

  update-manifest:
    name: "Update K8s Manifest"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    permissions:
      contents: write

    env:
      MANIFEST_PATH: k8s/gxsio-docs/deployment.yaml
      IMAGE_NAME: gxsio-docs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_COMMIT }}
          ref: main
          fetch-depth: 0

      - name: Update image tag in deployment manifest
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          sed -i "s|image: .*|image: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}|" ${{ env.MANIFEST_PATH }}

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ${{ env.MANIFEST_PATH }}
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(k8s): update gxsio-docs image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done

          echo "Failed to push manifest update after retries"
          exit 1
